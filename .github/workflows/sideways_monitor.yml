name: 横盘爆发监视器 (USDT Perpetuals)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4,12 * * *'

jobs:
  run-sideways-scanner:
    runs-on: ubuntu-22.04

    steps:
    - name: 将代码迁出至虚拟机
      uses: actions/checkout@v3

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 安装依赖
      run: pip install requests pandas numpy

    - name: 启动横盘扫描引擎 (通过 Vercel 东京反代)
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        INTERVAL: ${{ vars.INTERVAL }}
        LIMIT: ${{ vars.LIMIT }}
        BBW_THRESHOLD: ${{ vars.BBW_THRESHOLD }}
        BB_TOLERANCE: ${{ vars.BB_TOLERANCE }}
        MIN_DURATION: ${{ vars.MIN_DURATION }}
      run: python sideways_scanner.py

    - name: 在日志中输出完整横盘榜单
      run: |
        echo "============================================"
        echo "       SIDEWAYS REPORT OUTPUT"
        echo "============================================"
        cat sideways_report.md

    - name: 上传报告为可下载工件
      uses: actions/upload-artifact@v4
      with:
        name: sideways-report
        path: sideways_report.md
        retention-days: 30
